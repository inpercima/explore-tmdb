<div class="navbar bg-primary text-primary-content shadow-lg">
  <div class="flex-1">
    <span class="text-xl font-bold px-4">{{ appname }}</span>
  </div>
  <div class="flex-none gap-1 px-4">
    <button class="btn btn-ghost btn-sm" (click)="openDialog()">APP INFO</button>
    <span class="opacity-40">|</span>
    <a
      class="btn btn-ghost btn-sm gap-2"
      href="https://github.com/inpercima/explore-tmdb"
      aria-label="GitHub Repository"
      title="Go to project on Github"
      target="_blank"
    >
      <img class="h-5" alt="GitHub Repository" src="github-mark-white.svg" />
      GitHub
    </a>
  </div>
</div>

<dialog id="app-info-modal" class="modal">
  <div class="modal-box max-w-2xl">
    <h3 class="font-bold text-lg">Overview</h3>
    <p class="py-4">
      A simple web app that allows users to browse public lists in The Movie Database (TMDb) using the API.
      <br />
      For demonstration, I use my own lists by default.
    </p>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

<app-dashboard></app-dashboard>
